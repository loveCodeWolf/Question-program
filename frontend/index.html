<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>刷题系统</title>
  <link rel="stylesheet" href="./css/main.css">
  <style>
    .bank-info { background: linear-gradient(135deg, #4a6cf7, #6c63ff); color: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .bank-info h1 { color: #fff; font-size: 22px; margin-bottom: 6px; }
    .bank-info p { font-size: 13px; opacity: 0.85; }
    .greeting { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #666; margin-bottom: 12px; }
    .greeting .avatar { width: 36px; height: 36px; border-radius: 50%; background: #4a6cf7; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
    .bank-tabs { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; }
    .bank-tab { flex: 1; min-width: 0; padding: 10px 8px; border-radius: 10px; background: #f5f7fa; border: 2px solid transparent; text-align: center; cursor: pointer; transition: all .2s; }
    .bank-tab.active { border-color: #4a6cf7; background: #eef1ff; }
    .bank-tab .name { font-size: 13px; font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bank-tab.active .name { color: #4a6cf7; }
    .bank-tab .count { font-size: 11px; color: #999; margin-top: 2px; }
    .bank-tab.active .count { color: #6c63ff; }
  </style>
</head>
<body>
<div class="container">
  <!-- 题库切换 -->
  <div class="bank-tabs" id="bankTabs"></div>

  <!-- 题库信息 -->
  <div class="bank-info" id="bankInfo">
    <h1 id="bankName">加载中...</h1>
    <p>总题量：<span id="totalNum">-</span>题</p>
  </div>

  <!-- 用户信息 -->
  <div class="greeting">
    <div class="avatar" id="avatar">U</div>
    <span>刷题中...</span>
  </div>

  <!-- 四大功能入口 -->
  <div class="func-row">
    <div class="func-card" onclick="goPage('wrong-collect.html?tab=wrong')">
      <div class="icon">✕</div>
      <p>错题</p>
    </div>
    <div class="func-card" onclick="goPage('wrong-collect.html?tab=collect')">
      <div class="icon">★</div>
      <p>收藏</p>
    </div>
    <div class="func-card" onclick="goPage('wrong-collect.html?tab=master')">
      <div class="icon">✓</div>
      <p>斩题</p>
    </div>
    <div class="func-card" onclick="goPage('wrong-collect.html?tab=note')">
      <div class="icon">📝</div>
      <p>笔记</p>
    </div>
  </div>

  <!-- 刷题模式 -->
  <div class="practice-row">
    <div class="practice-card seq" onclick="openSeqPractice()">
      <h3>顺序练习</h3>
      <p>当前进度：<span id="progressIdx">1</span>/<span id="totalNum2">-</span></p>
    </div>
    <div class="practice-card random" onclick="openRandomModal()">
      <h3>随机练习</h3>
      <p>自定义设置练习量</p>
    </div>
  </div>

  <!-- 扩展功能 -->
  <div class="extra-func">
    <button onclick="goPage('wrong-collect.html?tab=easy')">📊 易错题专区</button>
    <button onclick="goPage('exam.html')">📋 模拟考试</button>
  </div>
</div>

<!-- 随机刷题弹窗 -->
<div class="modal" id="randomModal">
  <div class="modal-box">
    <h3>随机刷题</h3>
    <p class="text-muted" style="margin-bottom: 12px;">设置本次随机练习的题量</p>
    <input type="number" id="randomNum" value="20" min="1" max="200">
    <div class="btns">
      <button onclick="closeModal('randomModal')">取消</button>
      <button onclick="startRandom()">开始刷题</button>
    </div>
  </div>
</div>

<script type="module">
  import { getBankList, getBankCount, loadProgress } from "./js/api.js";

  let BANK_ID = parseInt(localStorage.getItem("quiz_bank_id")) || 1;
  let bankList = [];

  // 用户头像
  const uid = localStorage.getItem("quiz_uid") || "U";
  document.getElementById("avatar").textContent = uid.slice(-2).toUpperCase();

  // ---- 题库切换 ----
  async function loadBanks() {
    bankList = await getBankList();
    if (!bankList || bankList.length === 0) return;

    const tabsHtml = bankList.map(b => `
      <div class="bank-tab ${b.bank_id === BANK_ID ? 'active' : ''}" data-id="${b.bank_id}" onclick="switchBank(${b.bank_id})">
        <div class="name">${b.bank_name}</div>
        <div class="count">${b.total_questions || '-'}题</div>
      </div>
    `).join("");
    document.getElementById("bankTabs").innerHTML = tabsHtml;

    // 如果 localStorage 存的 BANK_ID 在列表中不存在，默认第一个
    if (!bankList.find(b => b.bank_id === BANK_ID)) {
      BANK_ID = bankList[0].bank_id;
      localStorage.setItem("quiz_bank_id", BANK_ID);
    }

    updateBankInfo();
  }

  window.switchBank = function(id) {
    BANK_ID = id;
    localStorage.setItem("quiz_bank_id", id);
    // 更新 tab 高亮
    document.querySelectorAll(".bank-tab").forEach(el => {
      el.classList.toggle("active", parseInt(el.dataset.id) === id);
    });
    updateBankInfo();
  };

  async function updateBankInfo() {
    const bank = bankList.find(b => b.bank_id === BANK_ID);
    if (bank) {
      document.getElementById("bankName").textContent = bank.bank_name;
    }

    const { total } = await getBankCount(BANK_ID);
    document.getElementById("totalNum").textContent = total || "-";
    document.getElementById("totalNum2").textContent = total || "-";

    // 加载本地进度
    const saved = loadProgress(BANK_ID);
    document.getElementById("progressIdx").textContent = saved;
    window._savedProgress = saved;
  }

  // ---- 页面跳转（自动带上 bankId） ----
  window.goPage = function(path) {
    const sep = path.includes("?") ? "&" : "?";
    location.href = path + `${sep}bankId=${BANK_ID}`;
  };

  window.openSeqPractice = function() {
    const saved = window._savedProgress || loadProgress(BANK_ID);
    location.href = `practice.html?bankId=${BANK_ID}&type=seq&idx=${saved}`;
  };
  window.openRandomModal = function() {
    document.getElementById("randomModal").classList.add("active");
  };
  window.closeModal = function(id) {
    document.getElementById(id).classList.remove("active");
  };
  window.startRandom = function() {
    const num = document.getElementById("randomNum").value || 20;
    location.href = `practice.html?bankId=${BANK_ID}&type=random&num=${num}`;
  };

  // 点击弹窗外部关闭
  document.getElementById("randomModal").addEventListener("click", function(e) {
    if (e.target === this) this.classList.remove("active");
  });

  // ---- 启动 ----
  loadBanks();
</script>
</body>
</html>
